# Resources page content.
# To add a link: add an entry under the relevant category's `links` list.
# To add a new category: copy a category block and fill in the fields.
# Fields:
#   category:  Section heading
#   icon:      Font Awesome icon name (without "fa-"), e.g. "graduation-cap"
#   links:
#     - label: Display text
#       url:   Full URL
#       note:  Optional short description shown under the label

