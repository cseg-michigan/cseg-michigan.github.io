# Officers for the current academic year, grouped by committee on the Officers page.
# To add an officer: copy an entry block, fill in the fields, and add their photo to img/portfolio/.
# To remove an officer: delete their entry block.
# Fields:
#   name:        Full name (displayed under photo and in modal)
#   role:        Position title
#   committee:   Which committee group the card appears under. Must exactly match one of:
#                "Executive and Communications Committee"
#                "Student Life Committee"
#                "Recruitment/Admissions/Hiring Committee"
#                "Faculty Advisor"
#                (The list of committees and their order is set in _includes/portfolio_grid.html.)
#   img:         Filename in img/portfolio/ (e.g. diana.jpg)
#                Use placeholder.svg if a headshot isn't available yet,
#                or vacant.svg for an open (re-election) position.
#   description: Short bio that expands under your card when someone clicks your photo.
#                Write it yourself! A few sentences is plenty: research area or program,
#                where you're from, what you do outside the lab. Markdown works
#                (links, *italics*). Leave blank and the card shows "Bio coming soon."
#
# Multi-line bio example (the > lets you wrap lines freely):
#   description: >
#     Hi, I'm Danni! I'm a 3rd-year PhD student working on AI for Social Impact.
#     Outside the lab, you'll find me playing video games, cooking, or enjoying the sunshine with friends outside.


