<!-- Officers Grid -->
<!-- Officer data lives in _data/officers.yml: edit that file to add, remove, or update officers. -->
<!-- Officer photos go in img/portfolio/. Clicking a card expands the bio in place. -->

<section id="portfolio">
  <div class="container portfolio-flex-grid">
    <div class="section-head">
      <h2>2026-2027 Officers</h2>
    </div>

    <div class="portfolio-flex-row">
      {% for officer in site.data.officers %}
      <details class="portfolio-flex-item officer-card">
        <summary>
          <span class="officer-photo">
            <img src="{{ '/img/portfolio/' | append: officer.img | relative_url }}"
                 alt="{{ officer.name }}">
            <span class="officer-photo-hint" aria-hidden="true"><i class="fa fa-chevron-down"></i></span>
          </span>
          <span class="officer-name">{{ officer.name }}</span>
          {% if officer.role %}
          <span class="officer-role">{{ officer.role }}</span>
          {% endif %}
        </summary>
        <div class="officer-bio">
          {% if officer.description and officer.description != "" %}
          {{ officer.description | markdownify }}
          {% else %}
          <p class="officer-bio-empty">Bio coming soon.</p>
          {% endif %}
        </div>
      </details>
      {% endfor %}
    </div>

  </div>
</section>
