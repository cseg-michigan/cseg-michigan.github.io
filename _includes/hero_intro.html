<!-- Community Highlight Carousel -->
<!-- Highlight data lives in _data/highlights.yml — edit that file to add or update highlights. -->
<!-- Photos go in img/highlights/. -->

<section id="hero-top">
  <div class="container">

    <div class="row">
      <div class="col-md-12">

        <div id="highlight-carousel" class="carousel slide highlight-carousel" data-ride="carousel" data-interval="5000">

          <ol class="carousel-indicators">
            {% for highlight in site.data.highlights %}
            <li data-target="#highlight-carousel" data-slide-to="{{ forloop.index0 }}"{% if forloop.first %} class="active"{% endif %}></li>
            {% endfor %}
          </ol>

          <div class="carousel-inner">
            {% for highlight in site.data.highlights %}
            <div class="item{% if forloop.first %} active{% endif %}">
              <img src="{{ '/img/highlights/' | append: highlight.img | relative_url }}" alt="{{ highlight.alt }}">
              <div class="highlight-caption-block">
                <span class="highlight-season-badge">Community Highlight &mdash; {{ highlight.season }}</span>
                <p class="highlight-caption-text">{{ highlight.caption }}</p>
                {% if highlight.credit %}
                <p class="highlight-photo-credit">Photo: {{ highlight.credit }}</p>
                {% endif %}
              </div>
            </div>
            {% endfor %}
          </div>

          <a class="left carousel-control" href="#highlight-carousel" data-slide="prev">
            <i class="fa fa-chevron-left"></i>
          </a>
          <a class="right carousel-control" href="#highlight-carousel" data-slide="next">
            <i class="fa fa-chevron-right"></i>
          </a>

        </div>

      </div>
    </div>

  </div>
</section>
