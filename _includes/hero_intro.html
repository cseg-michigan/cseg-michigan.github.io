<!-- Home page hero photo -->
<!-- Shows the first entry in _data/highlights.yml. To change the photo, edit that entry
     (or swap the file in img/highlights/). -->

{% assign highlight = site.data.highlights | first %}

<section id="hero-top">
  <div class="container">
    <div class="row">
      <div class="col-md-12">

        <div class="highlight-single">
          {% if highlight.url %}
          <img src="{{ highlight.url }}" alt="{{ highlight.alt }}">
          {% else %}
          <img src="{{ '/img/highlights/' | append: highlight.img | relative_url }}" alt="{{ highlight.alt }}">
          {% endif %}
          <div class="highlight-caption-block">
            <span class="highlight-season-badge">Community Highlight &mdash; {{ highlight.season }}</span>
            <p class="highlight-caption-text">{{ highlight.caption }}</p>
            {% if highlight.credit %}
            <p class="highlight-photo-credit">Photo: {{ highlight.credit }}</p>
            {% endif %}
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
