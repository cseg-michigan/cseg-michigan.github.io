<!-- Home: recent events teaser — pulls from _data/past_events.yml (same data as the Life page). -->

<section id="home-events" class="section">
  <div class="container">

    <div class="section-head">
      <span class="section-eyebrow">Out &amp; About</span>
      <h2>Life in CSEG</h2>
      <p class="section-lead">
        Cookouts, game nights, ice skating, bowling &mdash; the moments that make the department feel like a community.
      </p>
    </div>

    <div class="row event-teaser-row">
      {% for event in site.data.past_events limit: 3 %}
      <div class="col-sm-4">
        <a class="c-card c-card--hover event-teaser-card" href="{{ '/life-at-cseg/' | relative_url }}">
          <div class="event-teaser-photo">
            <img src="{{ '/' | append: event.photos.first | relative_url }}" alt="{{ event.title }}">
          </div>
          <div class="event-teaser-body">
            <h3>{{ event.title }}</h3>
            <p class="event-teaser-date">{{ event.date }}</p>
          </div>
        </a>
      </div>
      {% endfor %}
    </div>

    <div class="section-more">
      <a class="btn-cseg-ghost" href="{{ '/life-at-cseg/' | relative_url }}">See more from Life in CSEG</a>
    </div>

  </div>
</section>
