<!-- Home: community highlight. The photo is the first entry in _data/highlights.yml. -->

{% assign highlight = site.data.highlights | first %}

<section id="home-events" class="section">
  <div class="container">

    <div class="section-head">
      <h2>Life in CSEG</h2>
    </div>

    <div class="row">
      <div class="col-md-10 col-md-offset-1">
        <div class="c-card highlight-feature">
          {% if highlight.url %}
          <img src="{{ highlight.url }}" alt="{{ highlight.alt }}">
          {% else %}
          <img src="{{ '/img/highlights/' | append: highlight.img | relative_url }}" alt="{{ highlight.alt }}">
          {% endif %}
          <div class="highlight-feature-body">
            <span class="chip">Community Highlight &middot; {{ highlight.season }}</span>
            <p>{{ highlight.caption }}</p>
            {% if highlight.credit %}<p class="highlight-feature-credit">Photo: {{ highlight.credit }}</p>{% endif %}
          </div>
        </div>
      </div>
    </div>

    <div class="section-more">
      <a class="btn-cseg-ghost" href="{{ '/life-at-cseg/' | relative_url }}">See more from Life in CSEG</a>
    </div>

  </div>
</section>
